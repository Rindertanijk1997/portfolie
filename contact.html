    <link rel="icon" type="image/png" href="images/profile/RvD.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/light-mode.css">
</head>

<body>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">&lt; Rindert van Dijk /&gt;</a>
            <nav class="nav">
                <button id="theme-toggle" aria-label="Växla tema">
                    <span class="theme-knob">☼</span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Meny">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html">Hem</a></li>
                    <li><a href="about.html">Om Mig</a></li>
                    <li><a href="contact.html">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-hero container">
            <h1>Kontakta Mig</h1>
            <p>Hör av dig för samarbete eller frågor</p>
        </section>

        <section class="contact-content container">
            <div class="contact-info">
                <h2>Kontaktuppgifter</h2>
                <div class="divider"></div>

                <div class="contact-item">
                    <span class="contact-label">E-post</span>
                    <a href="mailto:rindert.vandijk@hotmail.se">rindert.vandijk@hotmail.se</a>
                </div>

                <div class="contact-item">
                    <span class="contact-label">Mobil</span>
                    <a href="tel:+46730205483">+46 73 020 54 83</a>
                </div>

                <div class="contact-item">
                    <span class="contact-label">Plats</span>
                    <span>Stockholm, Sverige</span>
                </div>

                <div class="contact-item">
                    <span class="contact-label">LinkedIn</span>
                    <a href="https://www.linkedin.com/in/rindertvandijk" target="_blank" rel="noopener noreferrer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                        Rindert van Dijk
                    </a>
                </div>

                <div class="contact-availability">
                    <span class="availability-dot"></span>
                    Tillgänglig för nya uppdrag
                </div>
            </div>

            <form class="contact-form" id="contact-form">
                <div class="form-group">
                    <label for="name">Namn</label>
                    <input type="text" id="name" name="name" placeholder="Ditt namn" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="din@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">Ämne</label>
                    <input type="text" id="subject" name="subject" placeholder="Vad gäller det?" required>
                </div>
                <div class="form-group">
                    <label for="message">Meddelande</label>
                    <textarea id="message" name="message" rows="6" placeholder="Skriv ditt meddelande här..." required></textarea>
                </div>
                <button type="submit" class="btn" id="submit-btn">Skicka Meddelande</button>
                <p class="form-status" id="form-status"></p>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p class="footer-sign">© <span id="year"></span> Rindert van Dijk</p>
            <a href="https://www.linkedin.com/in/rindertvandijk" target="_blank" rel="noopener noreferrer" class="footer-linkedin">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                LinkedIn
            </a>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
